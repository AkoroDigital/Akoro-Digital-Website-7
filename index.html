<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Akoro Digital</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@100;300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
  <style>
    :root {
      /* Warm light luxury palette */
      --bg: #f7f3ea;
      --bg-soft: #f1ebdd;
      --surface: #fffdf8;
      --surface-2: #faf5ea;
      --border: #e6dcc6;
      --border-soft: #efe7d6;

      --ink: #211d16;          /* deep espresso text */
      --ink-soft: #6f6757;     /* muted text */

      --gold: #9a6f1c;         /* deep bronze-gold, legible on light */
      --gold-mid: #c0922f;
      --gold-light: #d8b257;
      --gold-dim: #b08a3a;

      --green: #1f4d40;        /* deep emerald accent */
      --green-soft: #2e6354;

      --font-display: 'Cormorant Garamond', serif;
      --font-body: 'Josefin Sans', sans-serif;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html { scroll-behavior: smooth; }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: var(--font-body);
      font-weight: 300;
      letter-spacing: 0.04em;
      overflow-x: hidden;
    }

    /* subtle paper grain */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.04'/%3E%3C/svg%3E");
      pointer-events: none;
      z-index: 9999;
      opacity: 0.5;
      mix-blend-mode: multiply;
    }

    nav {
      position: fixed; top: 0; left: 0; right: 0;
      z-index: 100;
      display: flex; align-items: center; justify-content: space-between;
      padding: 1.2rem 5vw;
      background: linear-gradient(to bottom, rgba(247,243,234,0.98), rgba(247,243,234,0.85) 70%, rgba(247,243,234,0));
      backdrop-filter: blur(8px);
    }

    .nav-logo {
      font-family: var(--font-display);
      font-size: 1.5rem;
      font-weight: 600;
      letter-spacing: 0.15em;
      color: var(--gold);
      text-decoration: none;
      cursor: pointer;
      display: flex; align-items: center;
    }

    .nav-links {
      display: flex; gap: 2.5rem; list-style: none;
    }
    .nav-links a {
      color: var(--ink-soft);
      text-decoration: none;
      font-size: 0.72rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      transition: color 0.3s;
      cursor: pointer;
    }
    .nav-links a:hover { color: var(--gold); }

    /* Hamburger */
    .nav-toggle {
      display: none;
      flex-direction: column;
      justify-content: center;
      gap: 5px;
      width: 42px; height: 42px;
      background: transparent;
      border: 1px solid var(--border);
      border-radius: 4px;
      cursor: pointer;
      padding: 0 10px;
    }
    .nav-toggle span {
      display: block;
      height: 1.5px;
      width: 100%;
      background: var(--ink);
      transition: transform 0.3s, opacity 0.3s;
    }
    .nav-toggle.open span:nth-child(1) { transform: translateY(6.5px) rotate(45deg); }
    .nav-toggle.open span:nth-child(2) { opacity: 0; }
    .nav-toggle.open span:nth-child(3) { transform: translateY(-6.5px) rotate(-45deg); }

    .page { display: none; }
    .page.active { display: block; }

    /* ── HERO ── */
    #hero {
      min-height: 100vh;
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      position: relative;
      overflow: hidden;
      text-align: center;
      padding: 7rem 5vw 4rem;
    }

    .hero-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(154,111,28,0.07) 1px, transparent 1px),
        linear-gradient(90deg, rgba(154,111,28,0.07) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: radial-gradient(ellipse 80% 80% at 50% 45%, black 25%, transparent 100%);
      -webkit-mask-image: radial-gradient(ellipse 80% 80% at 50% 45%, black 25%, transparent 100%);
    }

    .hero-glow {
      position: absolute;
      width: 700px; height: 700px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(216,178,87,0.18) 0%, rgba(31,77,64,0.06) 45%, transparent 70%);
      top: 45%; left: 50%;
      transform: translate(-50%, -50%);
      pointer-events: none;
    }

    .hero-eyebrow {
      font-size: 0.68rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.3s forwards;
      position: relative;
    }

    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(3.5rem, 10vw, 8.5rem);
      font-weight: 400;
      line-height: 0.95;
      letter-spacing: -0.01em;
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fadeUp 1s 0.5s forwards;
      position: relative;
      color: var(--ink);
    }
    .hero-title .gold { color: var(--gold); font-style: italic; }

    .hero-tagline {
      font-size: 0.78rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--ink-soft);
      max-width: 480px;
      line-height: 2;
      opacity: 0;
      animation: fadeUp 1s 0.7s forwards;
      margin-bottom: 3rem;
      position: relative;
    }

    .hero-cta {
      display: flex; gap: 1.2rem;
      opacity: 0;
      animation: fadeUp 1s 0.9s forwards;
      flex-wrap: wrap; justify-content: center;
      position: relative;
    }

    .btn-gold {
      padding: 0.85rem 2.4rem;
      background: transparent;
      border: 1px solid var(--gold);
      color: var(--gold);
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: color 0.35s;
      position: relative;
      overflow: hidden;
      text-decoration: none;
      display: inline-block;
    }
    .btn-gold::before {
      content: '';
      position: absolute; inset: 0;
      background: var(--gold);
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.4,0,0.2,1);
    }
    .btn-gold:hover::before { transform: translateY(0); }
    .btn-gold:hover { color: #fffaf0; }
    .btn-gold span { position: relative; z-index: 1; }

    .btn-ghost {
      padding: 0.85rem 2.4rem;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--ink-soft);
      font-family: var(--font-body);
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      cursor: pointer;
      transition: all 0.35s;
      text-decoration: none;
      display: inline-block;
    }
    .btn-ghost:hover { border-color: var(--green); color: var(--green); }

    .gold-line {
      width: 60px; height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
      margin: 0 auto 1rem;
    }

    .section-label {
      font-size: 0.65rem;
      letter-spacing: 0.35em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 0.8rem;
    }

    .section-title {
      font-family: var(--font-display);
      font-size: clamp(2.5rem, 6vw, 5rem);
      font-weight: 400;
      line-height: 1.05;
      margin-bottom: 3rem;
      color: var(--ink);
    }
    .section-title em { color: var(--gold); font-style: italic; }

    /* ── REVIEWS (home) ── */
    .reviews-wrap {
      padding: 5rem 5vw 6rem;
      max-width: 1100px;
      margin: 0 auto;
      text-align: center;
    }
    .reviews-grid {
      display: grid;
      grid-template-columns: 1fr;
      gap: 1.5rem;
      max-width: 720px;
      margin: 2rem auto 0;
    }
    .review-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.8rem 2.4rem 2.4rem;
      position: relative;
      text-align: left;
      box-shadow: 0 18px 40px -28px rgba(33,29,22,0.4);
      transition: transform 0.4s, box-shadow 0.4s;
    }
    .review-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 26px 50px -28px rgba(33,29,22,0.45);
    }
    .review-card::before {
      content: '\201C';
      position: absolute;
      top: 0.2rem; left: 1.4rem;
      font-family: var(--font-display);
      font-size: 5rem;
      line-height: 1;
      color: var(--gold-light);
      opacity: 0.5;
    }
    .review-stars {
      color: var(--gold-mid);
      letter-spacing: 0.25em;
      font-size: 1rem;
      margin-bottom: 1.2rem;
    }
    .review-text {
      font-family: var(--font-display);
      font-size: 1.35rem;
      line-height: 1.55;
      color: var(--ink);
      font-weight: 400;
      margin-bottom: 1.6rem;
    }
    .review-author {
      display: flex; align-items: center; gap: 0.9rem;
    }
    .review-avatar {
      width: 44px; height: 44px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--green), var(--green-soft));
      color: #f4efe2;
      display: flex; align-items: center; justify-content: center;
      font-family: var(--font-display);
      font-size: 1.1rem;
      flex-shrink: 0;
    }
    .review-name a {
      color: var(--green);
      text-decoration: none;
      font-size: 0.82rem;
      letter-spacing: 0.08em;
      border-bottom: 1px solid transparent;
      transition: border-color 0.3s, color 0.3s;
    }
    .review-name a:hover { color: var(--gold); border-color: var(--gold); }
    .review-source {
      font-size: 0.6rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-top: 0.25rem;
    }
    .reviews-cta {
      margin-top: 2.6rem;
      display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap;
    }

    /* ── ABOUT ── */
    .about-wrap { min-height: 100vh; padding: 9rem 5vw 6rem; }

    .about-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 5vw;
      align-items: start;
      margin-top: 3rem;
    }

    .logo-block {
      display: flex; align-items: center; justify-content: center;
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      min-height: 340px;
      padding: 2.5rem;
      box-shadow: 0 18px 40px -30px rgba(33,29,22,0.4);
    }
    .logo-block::before {
      content: '';
      position: absolute; inset: 0;
      background: radial-gradient(circle at center, rgba(216,178,87,0.12) 0%, transparent 70%);
    }
    .logo-block img {
      width: 100%; height: 100%;
      object-fit: contain;
      position: relative; z-index: 1;
    }

    .about-text p {
      font-size: 0.9rem;
      line-height: 2;
      color: var(--ink-soft);
      margin-bottom: 1.5rem;
    }
    .about-text p strong { color: var(--ink); font-weight: 500; }

    .stats-row {
      display: grid; grid-template-columns: repeat(3, 1fr);
      gap: 1px;
      background: var(--border);
      margin-top: 3rem;
      border: 1px solid var(--border);
      border-radius: 6px;
      overflow: hidden;
    }
    .stat-item {
      background: var(--surface);
      padding: 2rem 1.5rem;
      text-align: center;
    }
    .stat-num {
      font-family: var(--font-display);
      font-size: 2.8rem;
      font-weight: 400;
      color: var(--gold);
      display: block;
      line-height: 1;
    }
    .stat-label {
      font-size: 0.62rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--ink-soft);
      margin-top: 0.5rem;
      display: block;
    }

    /* ── FOUNDERS ── */
    .founders-wrap { min-height: 100vh; padding: 9rem 5vw 6rem; }

    .founders-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 1.5rem;
      margin-top: 4rem;
    }

    .founder-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s, transform 0.4s, box-shadow 0.4s;
      box-shadow: 0 14px 34px -30px rgba(33,29,22,0.4);
    }
    .founder-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
      transform: scaleX(0);
      transition: transform 0.4s;
    }
    .founder-card:hover { border-color: var(--gold-dim); transform: translateY(-4px); box-shadow: 0 24px 44px -30px rgba(33,29,22,0.45); }
    .founder-card:hover::after { transform: scaleX(1); }

    .founder-avatar {
      width: 80px; height: 80px;
      border-radius: 50%;
      background: var(--surface-2);
      border: 1px solid var(--gold-dim);
      display: flex; align-items: center; justify-content: center;
      margin-bottom: 1.5rem;
    }
    .founder-initials {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 400;
      color: var(--gold);
      line-height: 1;
    }

    .founder-name {
      font-family: var(--font-display);
      font-size: 1.6rem;
      font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    .founder-role {
      font-size: 0.62rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: var(--gold);
      margin-bottom: 1.5rem;
    }
    .founder-bio {
      font-size: 0.82rem;
      line-height: 1.9;
      color: var(--ink-soft);
      margin-bottom: 2rem;
    }
    .founder-divider {
      width: 30px; height: 1px;
      background: var(--gold-dim);
      margin-bottom: 1.5rem;
    }
    .founder-contact { list-style: none; display: flex; flex-direction: column; gap: 0.6rem; }
    .founder-contact li {
      font-size: 0.72rem;
      letter-spacing: 0.08em;
      color: var(--ink-soft);
      display: flex; align-items: center; gap: 0.6rem;
    }
    .founder-contact li span { color: var(--gold-dim); font-size: 0.65rem; }
    .founder-contact a { color: var(--green); text-decoration: none; transition: color 0.3s; }
    .founder-contact a:hover { color: var(--gold); }

    .team-photo-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.4s, transform 0.4s, box-shadow 0.4s;
      display: flex; flex-direction: column;
      box-shadow: 0 14px 34px -30px rgba(33,29,22,0.4);
    }
    .team-photo-card::before, .team-photo-card::after {
      content: '';
      position: absolute; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
      z-index: 2;
    }
    .team-photo-card::before { top: 0; }
    .team-photo-card::after { bottom: 0; }
    .team-photo-card:hover { border-color: var(--gold-dim); transform: translateY(-4px); box-shadow: 0 24px 44px -30px rgba(33,29,22,0.45); }
    .team-photo-card img {
      width: 100%; height: 100%;
      object-fit: cover; display: block;
      min-height: 400px;
      filter: grayscale(12%) contrast(1.03);
      transition: filter 0.5s;
    }
    .team-photo-card:hover img { filter: grayscale(0%) contrast(1.06); }
    .team-photo-caption {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.2rem 1.5rem;
      background: linear-gradient(to top, rgba(33,29,22,0.85) 0%, transparent 100%);
      font-size: 0.62rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: var(--gold-light);
      text-align: center;
    }

    /* ── CONTACT ── */
    .contact-wrap {
      min-height: 100vh;
      padding: 9rem 5vw 6rem;
      display: flex; flex-direction: column; align-items: center;
    }
    .contact-inner { width: 100%; max-width: 700px; }
    .contact-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 4rem;
      position: relative;
      margin-top: 3rem;
      box-shadow: 0 18px 40px -30px rgba(33,29,22,0.4);
    }
    .contact-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, var(--gold-mid), transparent);
    }
    .contact-item {
      display: flex; align-items: flex-start; gap: 1.5rem;
      margin-bottom: 2.5rem; padding-bottom: 2.5rem;
      border-bottom: 1px solid var(--border-soft);
    }
    .contact-item:last-child { border-bottom: none; margin-bottom: 0; padding-bottom: 0; }
    .contact-icon {
      width: 44px; height: 44px; flex-shrink: 0;
      border: 1px solid var(--gold-dim); border-radius: 4px;
      display: flex; align-items: center; justify-content: center;
      font-size: 0.9rem; color: var(--gold);
    }
    .contact-detail-label {
      font-size: 0.6rem; letter-spacing: 0.3em;
      text-transform: uppercase; color: var(--gold); margin-bottom: 0.4rem;
    }
    .contact-detail-value {
      font-family: var(--font-display); font-size: 1.2rem;
      color: var(--ink); font-weight: 400;
    }
    .contact-detail-value a
